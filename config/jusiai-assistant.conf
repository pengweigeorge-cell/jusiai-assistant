# JuSi AI Assistant — configuration file.
#
# Lookup order (later overrides earlier):
#   1. built-in defaults
#   2. this file (see --config / default search paths in README)
#   3. JUSIAI_* environment variables
#   4. command-line flags
#
# Lines starting with '#' and blank lines are ignored. Format: key = value

# --- Backend (JuSi Meet device API) ---------------------------------------
# Base URL of the backend. The device API lives under <base_url>/device-api/v1.0.
base_url = https://meet.jusiai.com

# Pre-shared device API key (Authorization: Bearer <device_api_key>).
device_api_key = jusi-device-2025

# Stable per-device identifier. Leave blank to auto-generate and persist one
# under ~/.config/jusiai-assistant/device_id.
device_id =

# Room display name shown in the JuSi Meet backend / web console.
room_name = Linux AI 助手

# --- AI agent -------------------------------------------------------------
# provider: doubao | doubao_s2s | qwen
provider = doubao

# Optional overrides. Leave blank to use the provider defaults.
# voice         — output voice id (see GET /api/v1.0/rooms/ai-agent-config/)
# prompt_label  — assistant persona; must match a label from ai-agent-config
voice =
prompt_label = 通用 AI 助手

# --- Media ----------------------------------------------------------------
# Capture resolution requested from the camera (the device picks the closest).
camera_width = 640
camera_height = 480
camera_fps = 30

# Microphone capture / playback sample rate (Hz) and channel count.
audio_sample_rate = 48000
audio_channels = 1

# Acoustic echo cancellation (WebRTC APM). The speaker and microphone share the
# one ES8389 codec, so without it the agent hears its own playback and ends up
# talking to itself — keep it on. audio_aec_delay_ms is the speaker->mic
# round-trip delay hint for the canceller; tune on-board if echo leaks through.
audio_aec = true
audio_aec_delay_ms = 90

# Publish the local camera track to the room (the agent still works audio-only).
publish_video = true

# --- UI -------------------------------------------------------------------
window_width = 1024
window_height = 600
# fullscreen — true on a dedicated device with a fixed-size panel.
fullscreen = false

# Interface language: zh (Simplified Chinese, default) or en.
language = zh

# autostart — begin the AI call immediately on launch, without waiting for the
# Start button (useful on a dedicated kiosk / embedded device).
autostart = false

# --- Headless / remote control --------------------------------------------
# headless — run with no LVGL/framebuffer/touch UI, for screenless devices.
# The assistant is then driven only through the control API below; sibling
# voice / phone modules on the device call it. A non-headless device needs a
# framebuffer (/dev/fb0) and ignores these unless control_port is set.
headless = false

# Local HTTP control + status API.
#   control_port — TCP port; 0 disables the API. When headless is true and no
#                  port is given, it defaults to 8765 (a screenless device
#                  must stay controllable).
#   control_bind — bind address; keep 127.0.0.1 (the sibling modules are local).
control_bind = 127.0.0.1
control_port = 0
